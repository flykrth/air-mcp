name: AIR-MCP CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Lint and Typecheck Validation
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Python Syntax Checks
      - name: Install Python Code Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check Python Code Formatting (Black)
        run: |
          black --check backend/app/ || echo "Formatting check warning only"

      - name: Lint Python Code (Flake8 syntax limits)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # Node Frontend Checks
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Lint Frontend (ESLint)
        working-directory: frontend
        run: |
          npm run lint --if-present

      - name: Typecheck Frontend (TypeScript)
        working-directory: frontend
        run: |
          npx tsc --noEmit

      # Node MCP Server Checks
      - name: Install MCP Server Dependencies
        working-directory: mcp-server
        run: |
          npm ci

      - name: Typecheck MCP Server (TypeScript)
        working-directory: mcp-server
        run: |
          npx tsc --noEmit

  # 2. Python Backend Unit Tests
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Suite
        working-directory: backend
        run: |
          pytest

  # 3. Docker Image Verification Builds
  docker-verify:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

      - name: Verify Standalone MCP Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
